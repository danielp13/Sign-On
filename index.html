<style>
/* ==================================================================
   ROOT VARIABLES
   ================================================================== */
:root{
  --bg:               #000000;
  --glass-bg:         rgba(255,255,255,0.055);
  --glass-bg-strong:  rgba(255,255,255,0.09);
  --glass-border:     rgba(255,255,255,0.12);
  --text-primary:     #ffffff;
  --text-secondary:   rgba(235,235,245,0.60);
  --text-tertiary:    rgba(235,235,245,0.38);

  --accent-blue:      #0a84ff;
  --accent-teal:      #40c8e0;
  --accent-purple:    #bf5af2;
  --accent-green:     #30d158;
  --accent-orange:    #ff9f0a;
  --accent-red:       #ff453a;
  --accent-gold:      #ffd60a;

  --radius-lg: 24px;
  --radius-md: 20px;

  --shadow-card: 0 10px 30px rgba(0,0,0,0.55);
  --tab-bar-height: 78px;
}

*{
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body{
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text-primary);
  height: 100%;
  overscroll-behavior-y: none;
}

body{
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  background:
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(30,60,110,0.35), transparent 60%),
    var(--bg);
}

/* ==================================================================
   LAYOUT
   ================================================================== */
.app{
  max-width: 520px;
  margin: 0 auto;
  padding: calc(env(safe-area-inset-top) + 14px) 16px calc(var(--tab-bar-height) + env(safe-area-inset-bottom) + 24px);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ------------------------------------------------------------------
   HEADER (persistent across tabs)
   ------------------------------------------------------------------ */
.app-header{
  padding: 6px 4px 4px;
}

.app-title{
  display: flex;
  align-items: center;
  gap: 12px;
}

.app-icon{
  font-size: 32px;
  line-height: 1;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
}

.app-title h1{
  margin: 0;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.app-subtitle{
  margin: 2px 0 0;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

/* ------------------------------------------------------------------
   GLASS CARD BASE
   ------------------------------------------------------------------ */
.glass{
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  -webkit-backdrop-filter: blur(24px) saturate(150%);
  backdrop-filter: blur(24px) saturate(150%);
  box-shadow: var(--shadow-card);
  transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
}

@media (hover: hover) and (pointer: fine){
  .glass:hover{
    transform: translateY(-2px);
    background: var(--glass-bg-strong);
  }
}

/* ------------------------------------------------------------------
   VIEWS — only one visible at a time
   ------------------------------------------------------------------ */
.view{
  display: none;
  flex-direction: column;
  gap: 16px;
}
.view.active{
  display: flex;
  animation: viewFadeIn 0.35s ease both;
}
@keyframes viewFadeIn{
  from{ opacity: 0; transform: translateY(8px); }
  to{ opacity: 1; transform: translateY(0); }
}

/* ------------------------------------------------------------------
   PLANNER INPUTS
   ------------------------------------------------------------------ */
.input-section{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.input-card{
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.input-label{
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

.native-input{
  appearance: none;
  -webkit-appearance: none;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 20px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  width: 100%;
  padding: 2px 0;
  color-scheme: dark;
}

.native-input::-webkit-calendar-picker-indicator{
  filter: invert(1);
  opacity: 0.6;
}

.select-wrapper{
  position: relative;
}
.select-wrapper::after{
  content: "⌄";
  position: absolute;
  right: 2px;
  top: 46%;
  transform: translateY(-50%);
  font-size: 16px;
  color: var(--text-tertiary);
  pointer-events: none;
}
.native-select{
  padding-right: 20px;
  cursor: pointer;
}
.native-select option{
  background: #1c1c1e;
  color: var(--text-primary);
}

/* ------------------------------------------------------------------
   RESULTS GRID
   ------------------------------------------------------------------ */
.results-grid{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.result-card{
  position: relative;
  padding: 18px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 118px;
  overflow: hidden;
}

.result-card::before{
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.result-card[data-accent="blue"]::before  { background: var(--accent-blue); }
.result-card[data-accent="teal"]::before  { background: var(--accent-teal); }
.result-card[data-accent="purple"]::before{ background: var(--accent-purple); }
.result-card[data-accent="green"]::before { background: var(--accent-green); }

.result-icon{ font-size: 22px; }

.result-label{
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}

.result-time{
  font-size: clamp(30px, 9vw, 38px);
  font-weight: 700;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}

.result-badge{
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--accent-orange);
  min-height: 12px;
}

.pulse{ animation: pulseFlash 0.5s ease; }
@keyframes pulseFlash{
  0%   { opacity: 0.25; transform: scale(0.96); }
  60%  { opacity: 1;    transform: scale(1.02); }
  100% { opacity: 1;    transform: scale(1);    }
}

.rule-card{
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
}
#ruleIcon{ font-size: 16px; }

.countdown-card{
  padding: 20px 20px 22px;
  text-align: center;
  transition: background 0.4s ease, border-color 0.4s ease;
}
.countdown-label{
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.countdown-value{
  font-size: clamp(30px, 10vw, 42px);
  font-weight: 800;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.countdown-card.state-normal{
  border-color: rgba(48,209,88,0.35);
  background: rgba(48,209,88,0.08);
}
.countdown-card.state-normal .countdown-value{ color: var(--accent-green); }
.countdown-card.state-warning{
  border-color: rgba(255,159,10,0.45);
  background: rgba(255,159,10,0.10);
}
.countdown-card.state-warning .countdown-value{ color: var(--accent-orange); }
.countdown-card.state-passed{
  border-color: rgba(255,69,58,0.5);
  background: rgba(255,69,58,0.12);
}
.countdown-card.state-passed .countdown-value{ color: var(--accent-red); }

/* ------------------------------------------------------------------
   CHECKLISTS (Briefcase / Overnights)
   ------------------------------------------------------------------ */
.checklist-header{
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px 4px;
}

.checklist-title-group h2{
  margin: 0;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.checklist-progress{
  margin: 2px 0 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

.reset-btn{
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  color: var(--text-secondary);
  font-size: 17px;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease, color 0.2s ease;
}
.reset-btn:active{
  transform: scale(0.92);
  background: var(--glass-bg-strong);
}

/* Slim progress bar under the header */
.progress-track{
  height: 6px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}
.progress-fill{
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent-gold), #ffb300);
  transition: width 0.35s ease;
  width: 0%;
}

.checklist-items{
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.checklist-item{
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

.check-circle{
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 800;
  color: transparent;
  background: rgba(255,255,255,0.03);
  transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
}

.checklist-item.checked .check-circle{
  background: var(--accent-gold);
  border-color: var(--accent-gold);
  color: #1c1c00;
  transform: scale(1.05);
}

.item-label{
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  transition: color 0.2s ease;
  line-height: 1.3;
}

.checklist-item.checked .item-label{
  color: var(--text-tertiary);
  text-decoration: line-through;
  text-decoration-color: var(--text-tertiary);
}

.checklist-item:active{
  background: var(--glass-bg-strong);
}

/* ------------------------------------------------------------------
   FOOTER
   ------------------------------------------------------------------ */
.app-footer{
  text-align: center;
  padding-top: 6px;
}
.app-footer p{
  margin: 0;
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.02em;
}

/* ------------------------------------------------------------------
   BOTTOM TAB BAR
   ------------------------------------------------------------------ */
.tab-bar{
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
  background: rgba(20,20,22,0.72);
  border-top: 1px solid var(--glass-border);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  backdrop-filter: blur(28px) saturate(160%);
  z-index: 100;
}

.tab-btn{
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 10px 0 8px;
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-family: inherit;
  transition: color 0.2s ease, transform 0.15s ease;
}

.tab-btn:active{ transform: scale(0.94); }

.tab-icon{ font-size: 22px; line-height: 1; }
.tab-label{
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.tab-btn.active{ color: var(--accent-blue); }

/* ------------------------------------------------------------------
   SMALL SCREENS
   ------------------------------------------------------------------ */
@media (max-width: 340px){
  .result-time{ font-size: 26px; }
  .app-title h1{ font-size: 22px; }
}
</style>

<body>
<div class="app">

  <!-- ============================================================
       HEADER (shown above every tab)
       ============================================================ -->
  <header class="app-header">
    <div class="app-title">
      <span class="app-icon">🛫</span>
      <div>
        <h1>Pre Flight TAP</h1>
        <p class="app-subtitle">Crew Ops Toolkit</p>
      </div>

  </header>

  <!-- ============================================================
       VIEW 1 — DEPARTURE PLANNER
       ============================================================ -->

      <div class="input-card glass">
        <label class="input-label" for="signOnTime">Sign On</label>

            <option value="30">30 min</option>

        </div>
      </div>

      <div class="input-card glass">
        <label class="input-label" for="ttaOffset">TTA Gap</label>
        <div class="select-wrapper">
          <select id="ttaOffset" class="native-input native-select">
            <option value="15">15 min</option>
            <option value="10">10 min</option>
          </select>
        </div>

    </section>

    <section class="results-grid">
      <div class="result-card glass" data-accent="blue">

      <div class="result-card glass" data-accent="purple">

        <div class="result-badge" id="badge-tta"></div>
      </div>

      <div class="result-card glass" data-accent="green">
        <div class="result-icon">✈️</div>
        <div class="result-label">Sign On</div>
        <div class="result-time" id="time-signon">--:--</div>
        <div class="result-badge" id="badge-signon"></div>
      </div>
    </section>

    <section class="rule-card glass" id="ruleCard">
      <span id="ruleIcon">🟢</span>
      <span id="ruleText">Using 50 minute travel rule</span>
    </section>

    <section class="countdown-card glass" id="countdownCard">
      <div class="countdown-label" id="countdownLabel">Leave home in</div>
      <div class="countdown-value" id="countdownValue">--</div>
    </section>

  </div>

  <!-- ============================================================
       VIEW 2 — BRIEFCASE CHECKLIST
       ============================================================ -->
  <div class="view" id="view-briefcase">
    <div class="checklist-header">
      <div class="checklist-title-group">
        <h2>💼 Briefcase</h2>
        <p class="checklist-progress" id="progress-briefcase">0 of 0 packed</p>
      </div>
      <button class="reset-btn" id="reset-briefcase" title="Reset checklist">↺</button>

       VIEW 3 — OVERNIGHTS CHECKLIST
       ============================================================ -->
  <div class="view" id="view-overnights">
    <div class="checklist-header">
      <div class="checklist-title-group">
        <h2>🌙 Overnights</h2>
        <p class="checklist-progress" id="progress-overnights">0 of 0 packed</p>
      </div>
      <button class="reset-btn" id="reset-overnights" title="Reset checklist">↺</button>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill-overnights"></div></div>
    <div class="checklist-items" id="items-overnights"></div>
  </div>

  <footer class="app-footer">
    <p>Works fully offline · All data stays on this device</p>
  </footer>

</div>

<!-- ============================================================
     BOTTOM TAB BAR
     ============================================================ -->
<nav class="tab-bar">
  <button class="tab-btn active" data-view="planner">
    <span class="tab-icon">🛫</span>
    <span class="tab-label">Planner</span>
  </button>
  <button class="tab-btn" data-view="briefcase">
    <span class="tab-icon">💼</span>
    <span class="tab-label">Briefcase</span>
  </button>
  <button class="tab-btn" data-view="overnights">
    <span class="tab-icon">🌙</span>
    <span class="tab-label">Overnights</span>
  </button>

<script>
/* ====================================================================
   PRE FLIGHT TAP
   Single-file offline app: Departure Planner + two packing checklists.
   ==================================================================== */

/* ================================================================
   TAB NAVIGATION
   ================================================================ */
const LAST_VIEW_KEY = 'preflighttap_lastView';

function showView(viewName){
  document.querySelectorAll('.view').forEach((el) => {
    el.classList.toggle('active', el.id === `view-${viewName}`);
  });
  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.view === viewName);
  });
  localStorage.setItem(LAST_VIEW_KEY, viewName);
}

function initTabBar(){
  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.addEventListener('click', () => showView(btn.dataset.view));
  });
  const savedView = localStorage.getItem(LAST_VIEW_KEY) || 'planner';
  showView(savedView);
}

/* ================================================================
   CHECKLISTS — Briefcase & Overnights
   ================================================================ */

// Exact items transcribed from the crew's existing Notes checklists.
const CHECKLIST_DATA = {
  briefcase: [
    'Headset', 'Licence', 'Medical Certificate', 'Flashlight',
    'Glasses (normal)', 'Contact lenses + case', 'Sun glasses (normal + graduação)',
    'EFB and charger', 'Passport / CC', 'Medication', 'Pen', 'Vest', 'Blazer',
    'Hat', 'Wallet', 'TAP crew card', 'Watch', 'Snacks / Refeições',
    'Chapéu chuva', 'Gravata', 'Galões', 'Cartão P6'
  ],
  overnights: [
    'Carregadores iPhone / Apple Watch / iPad', 'T-shirt dormir',
    'Calças/calções, t-shirt, camisola, tenis', 'Casaco', 'Roupa gym + tenis/meias',
    'Calções banho / chinelos', 'Roupa interior', 'Camisas farda',
    'Bolsa higiene (c/escova cabelo)', 'Máquinas barba', 'AirPods', 'iPad',
    'Comando PS5', 'Pala/tampões ouvidos p/ dormir', 'Refeições'
  ]
};

// Turn item text into a stable, storage-safe key (lowercase, no accents/punctuation).
function slugify(text){
  return text
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // strip accents
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)/g, '');
}

// Load the saved checked-state map for a given list ("briefcase"/"overnights").
function loadChecklistState(listName){
  try{
    const raw = localStorage.getItem(`preflighttap_checklist_${listName}`);
    return raw ? JSON.parse(raw) : {};
  } catch(e){
    return {};
  }
}

function saveChecklistState(listName, state){
  localStorage.setItem(`preflighttap_checklist_${listName}`, JSON.stringify(state));
}

// Build the DOM rows for a checklist and wire up tap-to-toggle behaviour.
function renderChecklist(listName){
  const items = CHECKLIST_DATA[listName];
  const container = document.getElementById(`items-${listName}`);
  const state = loadChecklistState(listName);

  container.innerHTML = ''; // clear before rebuilding

  items.forEach((label) => {
    const key = slugify(label);
    const row = document.createElement('div');
    row.className = 'checklist-item glass' + (state[key] ? ' checked' : '');
    row.dataset.key = key;
    row.innerHTML = `<span class="check-circle">✓</span><span class="item-label"></span>`;
    row.querySelector('.item-label').textContent = label;

    row.addEventListener('click', () => {
      const currentState = loadChecklistState(listName);
      currentState[key] = !currentState[key];
      saveChecklistState(listName, currentState);
      row.classList.toggle('checked', currentState[key]);
      updateChecklistProgress(listName);
    });

    container.appendChild(row);
  });

  updateChecklistProgress(listName);
}

// Update the "X of Y packed" label and the slim progress bar for a list.
function updateChecklistProgress(listName){
  const items = CHECKLIST_DATA[listName];
  const state = loadChecklistState(listName);
  const total = items.length;
  const checkedCount = items.reduce((count, label) => {
    return count + (state[slugify(label)] ? 1 : 0);
  }, 0);

  document.getElementById(`progress-${listName}`).textContent =
    `${checkedCount} of ${total} packed`;

  const pct = total === 0 ? 0 : Math.round((checkedCount / total) * 100);
  document.getElementById(`progressFill-${listName}`).style.width = `${pct}%`;
}

// Reset button: clears all checks for a list, with a simple confirm so a
// stray tap before a flight doesn't wipe an in-progress pack.
function initResetButton(listName){
  document.getElementById(`reset-${listName}`).addEventListener('click', () => {
    const confirmed = window.confirm(`Reset the ${listName} checklist? This will uncheck every item.`);
    if (!confirmed) return;
    saveChecklistState(listName, {});
    renderChecklist(listName);
  });
}

/* ================================================================
   DEPARTURE PLANNER (unchanged calculation logic)
   ================================================================ */

const STORAGE_KEYS = {
  date:           'signOnApp_dutyDate',
  time:           'signOnApp_signOnTime',
  travelOverride: 'signOnApp_travelOverride',
  ttaOffset:      'signOnApp_ttaOffset'
};

const MINUTES_P6_OFFSET      = 10;
const TRAVEL_MINUTES_LONG    = 50;
const TRAVEL_MINUTES_SHORT   = 30;
const DEFAULT_TTA_OFFSET_MIN = 15;

const AUTO_WINDOW_1_START_MIN = 8 * 60;
const AUTO_WINDOW_1_END_MIN   = 10 * 60;
const AUTO_WINDOW_2_START_MIN = 17 * 60;
const AUTO_WINDOW_2_END_MIN   = 20 * 60 + 30;

const COUNTDOWN_WARNING_MIN = 30;
const LEAVE_NOW_GRACE_MS    = 2 * 60 * 1000;

let dutyDateInput, signOnTimeInput, travelOverrideSelect, ttaOffsetSelect;
let currentSchedule = null;

function pad(n){ return n.toString().padStart(2, '0'); }
function formatTime(date){ return pad(date.getHours()) + ':' + pad(date.getMinutes()); }
function formatDateInputValue(date){
  return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + pad(date.getDate());
}
function combineDateAndTime(dateStr, timeStr){
  const [year, month, day] = dateStr.split('-').map(Number);
  const [hours, minutes]   = timeStr.split(':').map(Number);
  return new Date(year, month - 1, day, hours, minutes, 0, 0);
}
function addMinutes(date, minutes){ return new Date(date.getTime() + minutes * 60000); }
function isSameCalendarDay(a, b){
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function dayBadgeLabel(resultDate, referenceDate){
  if (isSameCalendarDay(resultDate, referenceDate)) return '';
  return resultDate < referenceDate ? 'PREV DAY' : 'NEXT DAY';
}
function formatDuration(ms){
  const totalMinutes = Math.max(0, Math.ceil(ms / 60000));
  const hours   = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  return hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
}

function computeSchedule(dutyDateStr, signOnTimeStr, travelOverride, ttaOffsetMinutes){
  const signOnDate = combineDateAndTime(dutyDateStr, signOnTimeStr);
  const ttaDate    = addMinutes(signOnDate, -ttaOffsetMinutes);
  const p6Date     = addMinutes(ttaDate, -MINUTES_P6_OFFSET);

  const dayOfWeek  = signOnDate.getDay();
  const isWeekday  = dayOfWeek >= 1 && dayOfWeek <= 5;

  const minutesOfDay = signOnDate.getHours() * 60 + signOnDate.getMinutes();
  const inWindow1 = minutesOfDay >= AUTO_WINDOW_1_START_MIN && minutesOfDay <= AUTO_WINDOW_1_END_MIN;
  const inWindow2 = minutesOfDay >= AUTO_WINDOW_2_START_MIN && minutesOfDay <= AUTO_WINDOW_2_END_MIN;

  const autoUsesLongRule = isWeekday && (inWindow1 || inWindow2);
  const autoTravelMinutes = autoUsesLongRule ? TRAVEL_MINUTES_LONG : TRAVEL_MINUTES_SHORT;

  const isManualOverride = travelOverride !== 'auto';
  const travelMinutes    = isManualOverride ? parseInt(travelOverride, 10) : autoTravelMinutes;
  const useLongTravelRule = travelMinutes === TRAVEL_MINUTES_LONG;

  const sairDate = addMinutes(p6Date, -travelMinutes);

  return { signOnDate, ttaDate, p6Date, sairDate, useLongTravelRule, travelMinutes, isManualOverride };
}

function updateTimeCard(timeElId, badgeElId, newDate, referenceDate){
  const timeEl  = document.getElementById(timeElId);
  const badgeEl = document.getElementById(badgeElId);
  const newText = formatTime(newDate);

  if (timeEl.textContent !== newText){
    timeEl.textContent = newText;
    timeEl.classList.remove('pulse');
    void timeEl.offsetWidth;
    timeEl.classList.add('pulse');
  }
  badgeEl.textContent = dayBadgeLabel(newDate, referenceDate);
}

function updateRuleCard(schedule){
  const ruleIcon = document.getElementById('ruleIcon');
  const ruleText = document.getElementById('ruleText');
  const minutes  = schedule.travelMinutes;

  if (schedule.isManualOverride){
    ruleIcon.textContent = '🟣';
    ruleText.textContent = `Manual override: ${minutes} minute travel rule`;
  } else if (schedule.useLongTravelRule){
    ruleIcon.textContent = '🟢';
    ruleText.textContent = `Using ${minutes} minute travel rule`;
  } else {
    ruleIcon.textContent = '🔵';
    ruleText.textContent = `Using ${minutes} minute travel rule`;
  }
}

function updateCountdown(){
  if (!currentSchedule) return;

  const card  = document.getElementById('countdownCard');
  const label = document.getElementById('countdownLabel');
  const value = document.getElementById('countdownValue');

  const now    = new Date();
  const diffMs = currentSchedule.sairDate.getTime() - now.getTime();

  card.classList.remove('state-normal', 'state-warning', 'state-passed');

  if (diffMs > COUNTDOWN_WARNING_MIN * 60000){
    card.classList.add('state-normal');
    label.textContent = 'Leave home in';
    value.textContent = formatDuration(diffMs);
  } else if (diffMs > 0){
    card.classList.add('state-warning');
    label.textContent = 'Leave home in';
    value.textContent = formatDuration(diffMs);
  } else if (diffMs > -LEAVE_NOW_GRACE_MS){
    card.classList.add('state-passed');
    label.textContent = '';
    value.textContent = 'Leave now!';
  } else {
    card.classList.add('state-passed');
    label.textContent = '';
    value.textContent = 'Departure time has passed.';
  }
}

function render(){
  const dutyDateStr    = dutyDateInput.value;
  const signOnTimeStr  = signOnTimeInput.value;
  const travelOverride = travelOverrideSelect.value;
  const ttaOffsetMin   = parseInt(ttaOffsetSelect.value, 10);

  if (!dutyDateStr || !signOnTimeStr) return;

  localStorage.setItem(STORAGE_KEYS.date, dutyDateStr);
  localStorage.setItem(STORAGE_KEYS.time, signOnTimeStr);
  localStorage.setItem(STORAGE_KEYS.travelOverride, travelOverride);
  localStorage.setItem(STORAGE_KEYS.ttaOffset, String(ttaOffsetMin));

  currentSchedule = computeSchedule(dutyDateStr, signOnTimeStr, travelOverride, ttaOffsetMin);
  const s = currentSchedule;

  updateTimeCard('time-signon', 'badge-signon', s.signOnDate, s.signOnDate);
  updateTimeCard('time-tta',    'badge-tta',    s.ttaDate,    s.signOnDate);
  updateTimeCard('time-p6',     'badge-p6',     s.p6Date,     s.signOnDate);
  updateTimeCard('time-sair',   'badge-sair',   s.sairDate,   s.signOnDate);

  updateRuleCard(s);
  updateCountdown();
}

function restoreOrDefaultInputs(){
  const now = new Date();
  const storedDate           = localStorage.getItem(STORAGE_KEYS.date);
  const storedTime           = localStorage.getItem(STORAGE_KEYS.time);
  const storedTravelOverride = localStorage.getItem(STORAGE_KEYS.travelOverride);
  const storedTtaOffset      = localStorage.getItem(STORAGE_KEYS.ttaOffset);

  dutyDateInput.value        = storedDate || formatDateInputValue(now);
  signOnTimeInput.value      = storedTime || formatTime(now);
  travelOverrideSelect.value = storedTravelOverride || 'auto';
  ttaOffsetSelect.value      = storedTtaOffset || String(DEFAULT_TTA_OFFSET_MIN);
}

/* ================================================================
   BOOTSTRAP
   ================================================================ */
document.addEventListener('DOMContentLoaded', () => {
  // Planner setup
  dutyDateInput        = document.getElementById('dutyDate');
  signOnTimeInput      = document.getElementById('signOnTime');
  travelOverrideSelect = document.getElementById('travelOverride');
  ttaOffsetSelect      = document.getElementById('ttaOffset');

  restoreOrDefaultInputs();
  render();

  dutyDateInput.addEventListener('input', render);
  signOnTimeInput.addEventListener('input', render);
  travelOverrideSelect.addEventListener('change', render);
  ttaOffsetSelect.addEventListener('change', render);

  setInterval(updateCountdown, 1000);

  // Checklist setup
  renderChecklist('briefcase');
  renderChecklist('overnights');
  initResetButton('briefcase');
  initResetButton('overnights');

  // Tab navigation
  initTabBar();

  // Service worker for offline caching
  if ('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }
});
</script>
